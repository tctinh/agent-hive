name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build hive-core
        working-directory: packages/hive-core
        run: bun run build

      - name: Reinstall to link workspace packages
        run: bun install

      - name: Build opencode-hive
        working-directory: packages/opencode-hive
        run: bun run build

      - name: Build vscode-hive
        working-directory: packages/vscode-hive
        run: bun run build

      - name: Test hive-core
        working-directory: packages/hive-core
        run: bun test

      - name: Test opencode-hive
        working-directory: packages/opencode-hive
        run: bun test

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: packages/vscode-hive/*.vsix

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: packages/opencode-hive/

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download npm package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: packages/opencode-hive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm publish credentials
        working-directory: packages/opencode-hive
        run: |
          npm_user="$(npm whoami)"
          echo "Authenticated to npm as ${npm_user}"
          collaborators_json="$(npm access list collaborators opencode-hive --json)"
          node -e "const collaborators = JSON.parse(process.argv[1]); const npmUser = process.argv[2]; const access = collaborators[npmUser]; if (!npmUser) { throw new Error('npm whoami returned an empty username'); } if (!access) { throw new Error(`npm user ${npmUser} is not listed as a collaborator on opencode-hive`); } if (access !== 'read-write') { throw new Error(`npm user ${npmUser} has ${access} access to opencode-hive; expected read-write`); } console.log(`npm publish preflight passed for ${npmUser} (${access})`);" "$collaborators_json" "$npm_user"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}

      - name: Publish to npm
        working-directory: packages/opencode-hive
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}

  publish-vscode:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Verify VS Code Marketplace credentials
        run: npx @vscode/vsce verify-pat tctinh
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  release:
    needs: [build, publish-npm, publish-vscode]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.vsix
          body_path: docs/releases/${{ github.ref_name }}.md
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
